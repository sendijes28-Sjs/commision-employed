version: '3.8'

services:
  app:
    build: .
    ports:
      - "${PORT:-4000}:4000"
    env_file: .env
    depends_on:
      - db
    volumes:
      - uploads_data:/app/uploads
    restart: always
    # DOCKER-3: Resource limits
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  db:
    image: postgres:15
    environment:
      - POSTGRES_USER=${DB_USER:-commission_user}
      - POSTGRES_PASSWORD=${DB_PASSWORD:?DB_PASSWORD must be set}
      - POSTGRES_DB=${DB_NAME:-commission_db}
    # DOCKER-3: Remove host port exposure — only accessible within Docker network
    # Uncomment below ONLY if you need direct host access for debugging
    # ports:
    #   - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

volumes:
  postgres_data:
  uploads_data:
